<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Tool Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #8b5cf6;
  --accent: #06b6d4;
  --text: #0f172a;
  --text-muted: #64748b;
  --bg: #ffffff;
  --bg-alt: #f8fafc;
  --bg-soft: #f1f5f9;
  --border: #e2e8f0;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
  --shadow-md: 0 6px 16px -4px rgba(15, 23, 42, .1);
  --shadow-lg: 0 20px 40px -12px rgba(99, 102, 241, .25);
  --radius: 14px;
  --radius-sm: 10px;
}
[data-theme="dark"] {
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --bg: #0b1020;
  --bg-alt: #0f172a;
  --bg-soft: #1e293b;
  --border: #1e293b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 6px 16px -4px rgba(0,0,0,.5);
  --shadow-lg: 0 20px 40px -12px rgba(99,102,241,.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ---------- Layout ---------- */
.app { display: flex; min-height: 100vh; }

/* ---------- Sidebar ---------- */
.sidebar {
  width: 280px;
  background: var(--bg-alt);
  border-right: 1px solid var(--border);
  position: fixed;
  inset: 0 auto 0 0;
  overflow-y: auto;
  z-index: 50;
  transition: transform .3s ease;
}
.sidebar-brand {
  padding: 1.25rem 1.5rem;
  display: flex;
  align-items: center;
  gap: .75rem;
  border-bottom: 1px solid var(--border);
}
.brand-logo {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: grid; place-items: center;
  color: #fff; font-size: 1rem;
  box-shadow: var(--shadow-md);
}
.brand-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -.01em; }
.brand-name span { color: var(--primary); }

.nav-group { padding: 1rem 0 .5rem; }
.nav-group-title {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  padding: .5rem 1.5rem;
}
.nav-item {
  display: flex; align-items: center; gap: .75rem;
  padding: .6rem 1.5rem;
  color: var(--text-muted);
  cursor: pointer;
  border: none; background: none;
  width: 100%; text-align: left;
  font-size: .9rem;
  font-family: inherit;
  border-left: 3px solid transparent;
  transition: all .15s ease;
}
.nav-item i { width: 18px; text-align: center; font-size: .9rem; }
.nav-item:hover { background: var(--bg-soft); color: var(--text); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(99,102,241,.12), transparent);
  color: var(--primary);
  border-left-color: var(--primary);
  font-weight: 600;
}

/* ---------- Main area ---------- */
.main { flex: 1; margin-left: 280px; display: flex; flex-direction: column; min-height: 100vh; }

.header {
  height: 64px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  position: sticky; top: 0; z-index: 40;
  backdrop-filter: blur(8px);
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.menu-btn {
  display: none;
  background: none; border: none; color: var(--text);
  font-size: 1.2rem; cursor: pointer;
}
.shortcut-pill {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .4rem .8rem;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  border-radius: 999px;
  font-size: .8rem;
  color: var(--text-muted);
}
.shortcut-pill kbd {
  font-family: inherit;
  font-size: .7rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--text);
}
.header-right { display: flex; align-items: center; gap: .75rem; }
.icon-btn {
  width: 38px; height: 38px;
  display: grid; place-items: center;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s ease;
}
.icon-btn:hover { color: var(--primary); border-color: var(--primary); }
.site-link {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .5rem .9rem;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff; text-decoration: none;
  border-radius: 10px;
  font-size: .85rem;
  font-weight: 600;
  box-shadow: var(--shadow-md);
}
.site-link:hover { transform: translateY(-1px); }

/* ---------- Content ---------- */
.content {
  flex: 1;
  padding: 2.5rem 2rem;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}

.tool-hero {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 2rem;
}
.tool-hero-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: grid; place-items: center;
  color: #fff; font-size: 1.4rem;
  box-shadow: var(--shadow-lg);
}
.tool-hero h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; }
.tool-hero p { color: var(--text-muted); font-size: .95rem; }

.card {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.75rem;
  box-shadow: var(--shadow-sm);
}

.label {
  display: block;
  font-weight: 600;
  font-size: .85rem;
  margin-bottom: .5rem;
}
.input, .textarea, .select {
  width: 100%;
  padding: .85rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: .9rem;
  font-family: inherit;
  transition: all .15s ease;
}
.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(99, 102, 241, .12);
}
.textarea { min-height: 140px; resize: vertical; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.field { margin-bottom: 1.25rem; }

.btn-row { display: flex; gap: .75rem; margin-top: .5rem; }
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .8rem 1.4rem;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: .9rem;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s ease;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
  box-shadow: var(--shadow-md);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg-soft); }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Result ---------- */
.result {
  margin-top: 1.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  min-height: 80px;
}
.result-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.result-head h3 { font-size: .95rem; font-weight: 600; }
.result-content {
  white-space: pre-wrap;
  font-size: .92rem;
  line-height: 1.75;
  color: var(--text);
}
.result-empty { color: var(--text-muted); font-size: .9rem; text-align: center; padding: 1rem; }

.copy-btn {
  background: none; border: 1px solid var(--border);
  padding: .4rem .8rem; border-radius: 8px;
  color: var(--text-muted); cursor: pointer;
  font-size: .8rem; font-family: inherit;
  display: inline-flex; align-items: center; gap: .35rem;
}
.copy-btn:hover { color: var(--primary); border-color: var(--primary); }

/* ---------- Chat ---------- */
.chat {
  display: flex; flex-direction: column;
  height: calc(100vh - 280px);
  min-height: 480px;
}
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1rem;
}
.msg { display: flex; gap: .75rem; margin-bottom: 1rem; }
.msg.user { flex-direction: row-reverse; }
.avatar {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: grid; place-items: center;
  color: #fff; font-size: .8rem;
  flex-shrink: 0;
}
.avatar.ai { background: linear-gradient(135deg, var(--accent), var(--primary)); }
.avatar.user { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
.bubble {
  max-width: 75%;
  padding: .75rem 1rem;
  border-radius: 14px;
  background: var(--bg-soft);
  font-size: .9rem;
  line-height: 1.6;
  white-space: pre-wrap;
}
.msg.user .bubble {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
}
.chat-input-row { display: flex; gap: .5rem; }
.chat-input-row .input { flex: 1; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}
.empty-state i { font-size: 2rem; margin-bottom: .75rem; color: var(--primary); opacity: .6; }

/* ---------- Footer ---------- */
.footer {
  border-top: 1px solid var(--border);
  background: var(--bg-alt);
  padding: 1.25rem 2rem;
  display: flex; justify-content: space-between; align-items: center;
  gap: 1rem;
  font-size: .85rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.footer a { color: var(--text-muted); text-decoration: none; margin-left: 1rem; }
.footer a:hover { color: var(--primary); }

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .main { margin-left: 0; }
  .menu-btn { display: grid; place-items: center; }
  .row { grid-template-columns: 1fr; }
  .content { padding: 1.5rem 1rem; }
  .shortcut-pill { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><i class="fa-solid fa-bolt"></i></div>
      <div class="brand-name">AI<span>Hub</span></div>
    </div>

    <nav id="nav"></nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <div class="header-left">
        <button class="menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
        <span class="shortcut-pill">
          <kbd>Ctrl</kbd> + <kbd>K</kbd> to focus
        </span>
      </div>
      <div class="header-right">
        <a class="site-link" href="https://www.google.com" target="_blank" rel="noopener">
          <i class="fa-solid fa-globe"></i> Visit Website
        </a>
        <button class="icon-btn" id="themeBtn" title="Toggle theme">
          <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>
      </div>
    </header>

    <main class="content" id="content"></main>

    <footer class="footer">
      <div>© 2026 AI Hub. All-in-one AI workspace.</div>
      <div>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
      </div>
    </footer>
  </div>
</div>

<script>
// ---------- Tool registry ----------
const TOOLS = {
  // Creator Tools
  hook:        { name: "Hook Generator",         desc: "Scroll-stopping hooks for any content.",   icon: "fa-fish",        category: "Creator Tools",  group: "creator", inputLabel: "Topic or context" },
  script:      { name: "Script Generator",       desc: "Short-form video scripts in seconds.",      icon: "fa-film",        category: "Creator Tools",  group: "creator", inputLabel: "Video topic" },
  blog:        { name: "Blog Generator",         desc: "SEO-friendly blog posts on any topic.",     icon: "fa-newspaper",   category: "Creator Tools",  group: "creator", inputLabel: "Blog topic" },
  email:       { name: "Email Generator",        desc: "Professional emails that convert.",         icon: "fa-envelope",    category: "Creator Tools",  group: "creator", inputLabel: "Purpose / audience" },
  idea:        { name: "Idea Generator",         desc: "Fresh, actionable ideas on demand.",        icon: "fa-lightbulb",   category: "Creator Tools",  group: "creator", inputLabel: "What do you need ideas for?" },
  tweet:       { name: "Tweet Hook Generator",   desc: "Viral tweet hooks under 280 chars.",        icon: "fa-x-twitter",   category: "Creator Tools",  group: "creator", inputLabel: "Topic" },

  // SEO Tools
  keyword:     { name: "Keyword Generator",      desc: "Primary, long-tail & question keywords.",   icon: "fa-key",         category: "SEO Tools",      group: "seo",     inputLabel: "Topic or niche" },
  title:       { name: "Title Generator",        desc: "SEO titles that rank and get clicked.",     icon: "fa-heading",     category: "SEO Tools",      group: "seo",     inputLabel: "Article topic" },
  meta:        { name: "Meta Description",       desc: "High-CTR meta descriptions.",               icon: "fa-tag",         category: "SEO Tools",      group: "seo",     inputLabel: "Page topic" },
  faq:         { name: "FAQ Generator",          desc: "FAQs optimized for snippets.",              icon: "fa-circle-question", category: "SEO Tools",  group: "seo",     inputLabel: "Topic" },
  yt_title:    { name: "YouTube Title Gen",      desc: "High-CTR YouTube video titles.",            icon: "fa-youtube",     category: "SEO Tools",      group: "seo",     inputLabel: "Video topic" },

  // Developer Tools
  debug:       { name: "Code Debugger",          desc: "Find & fix bugs instantly.",                icon: "fa-bug",         category: "Developer Tools",group: "dev",     inputLabel: "Paste your code" },
  code_gen:    { name: "Code Generator",         desc: "Production-ready code from a prompt.",      icon: "fa-code",        category: "Developer Tools",group: "dev",     inputLabel: "Describe what you want to build" },
  explain:     { name: "Code Explainer",         desc: "Plain-English code explanations.",          icon: "fa-book-open",   category: "Developer Tools",group: "dev",     inputLabel: "Paste your code" },
  convert:     { name: "Code Converter",         desc: "Convert code between languages.",           icon: "fa-shuffle",     category: "Developer Tools",group: "dev",     inputLabel: "Paste your code", hasTarget: true },
  sql:         { name: "SQL Query Generator",    desc: "Natural language → SQL.",                   icon: "fa-database",    category: "Developer Tools",group: "dev",     inputLabel: "Describe the query you need" },

  // Chatbots
  chat_general:    { name: "Custom Chatbot",     desc: "General-purpose AI assistant.",             icon: "fa-comments",    category: "Chatbots",      group: "chat",    isChat: true },
  chat_emotional:  { name: "Emotional Chatbot",  desc: "Empathetic, supportive companion.",         icon: "fa-heart",       category: "Chatbots",      group: "chat",    isChat: true },
  chat_career:     { name: "Career Coach Bot",   desc: "Practical career guidance.",                icon: "fa-briefcase",   category: "Chatbots",      group: "chat",    isChat: true },
  chat_mindfulness:{ name: "Mindfulness Bot",    desc: "Calm, grounding presence.",                 icon: "fa-spa",         category: "Chatbots",      group: "chat",    isChat: true },
};

const GROUPS = [
  { id: "creator", label: "Creator Tools" },
  { id: "seo",     label: "SEO Tools" },
  { id: "dev",     label: "Developer Tools" },
  { id: "chat",    label: "Chatbots" },
];

// ---------- Sidebar render ----------
const navEl = document.getElementById("nav");
GROUPS.forEach(g => {
  const groupDiv = document.createElement("div");
  groupDiv.className = "nav-group";
  groupDiv.innerHTML = `<div class="nav-group-title">${g.label}</div>`;
  Object.entries(TOOLS).filter(([_, t]) => t.group === g.id).forEach(([id, t]) => {
    const btn = document.createElement("button");
    btn.className = "nav-item";
    btn.dataset.tool = id;
    btn.innerHTML = `<i class="fa-solid ${t.icon}"></i><span>${t.name}</span>`;
    btn.addEventListener("click", () => selectTool(id));
    groupDiv.appendChild(btn);
  });
  navEl.appendChild(groupDiv);
});

// ---------- Tool selection ----------
const contentEl = document.getElementById("content");
let activeTool = null;
let chatHistory = [];

function selectTool(id) {
  activeTool = id;
  chatHistory = [];
  document.querySelectorAll(".nav-item").forEach(n => n.classList.toggle("active", n.dataset.tool === id));
  document.getElementById("sidebar").classList.remove("open");
  renderTool(id);
}

function renderTool(id) {
  const t = TOOLS[id];
  if (t.isChat) return renderChat(id, t);
  renderForm(id, t);
}

function renderForm(id, t) {
  const targetField = t.hasTarget ? `
    <div class="field">
      <label class="label">Target language</label>
      <select class="select" id="targetSelect">
        <option>Python</option><option>JavaScript</option><option>TypeScript</option>
        <option>Go</option><option>Rust</option><option>Java</option><option>C++</option>
        <option>C#</option><option>Ruby</option><option>PHP</option>
      </select>
    </div>` : "";

  contentEl.innerHTML = `
    <div class="tool-hero">
      <div class="tool-hero-icon"><i class="fa-solid ${t.icon}"></i></div>
      <div>
        <h1>${t.name}</h1>
        <p>${t.desc}</p>
      </div>
    </div>
    <div class="card">
      <div class="field">
        <label class="label">${t.inputLabel}</label>
        <textarea class="textarea" id="userInput" placeholder="Type here..."></textarea>
      </div>
      ${targetField}
      <div class="btn-row">
        <button class="btn btn-primary" id="generateBtn"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
        <button class="btn btn-ghost" id="clearBtn"><i class="fa-solid fa-rotate-left"></i> Clear</button>
      </div>
      <div class="result" id="result">
        <div class="result-empty">Your generated content will appear here.</div>
      </div>
    </div>
  `;

  document.getElementById("generateBtn").addEventListener("click", () => runGenerate(id));
  document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("userInput").value = "";
    document.getElementById("result").innerHTML = `<div class="result-empty">Your generated content will appear here.</div>`;
  });
  setTimeout(() => document.getElementById("userInput").focus(), 50);
}

async function runGenerate(id) {
  const input = document.getElementById("userInput").value.trim();
  if (!input) return;
  const btn = document.getElementById("generateBtn");
  const result = document.getElementById("result");
  const target = document.getElementById("targetSelect")?.value || "Python";

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Generating...`;
  result.innerHTML = `<div class="result-empty">Thinking…</div>`;

  try {
    const r = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tool: id, input, target }),
    });
    const data = await r.json();
    if (data.success) {
      result.innerHTML = `
        <div class="result-head">
          <h3>Result</h3>
          <button class="copy-btn" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
        </div>
        <div class="result-content" id="resultContent"></div>`;
      document.getElementById("resultContent").textContent = data.content;
      document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(data.content);
        const b = document.getElementById("copyBtn");
        b.innerHTML = `<i class="fa-solid fa-check"></i> Copied`;
        setTimeout(() => b.innerHTML = `<i class="fa-regular fa-copy"></i> Copy`, 1500);
      });
    } else {
      result.innerHTML = `<div class="result-empty">Error: ${data.error}</div>`;
    }
  } catch (e) {
    result.innerHTML = `<div class="result-empty">Network error. Please try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> Generate`;
  }
}

// ---------- Chat ----------
function renderChat(id, t) {
  contentEl.innerHTML = `
    <div class="tool-hero">
      <div class="tool-hero-icon"><i class="fa-solid ${t.icon}"></i></div>
      <div>
        <h1>${t.name}</h1>
        <p>${t.desc}</p>
      </div>
    </div>
    <div class="card">
      <div class="chat">
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">
            <i class="fa-solid ${t.icon}"></i>
            <div>Start a conversation. Ask anything.</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input class="input" id="chatInput" placeholder="Type your message..." />
          <button class="btn btn-primary" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  `;
  const inp = document.getElementById("chatInput");
  document.getElementById("sendBtn").addEventListener("click", () => sendChat(id));
  inp.addEventListener("keydown", e => { if (e.key === "Enter") sendChat(id); });
  setTimeout(() => inp.focus(), 50);
}

function appendMessage(role, text) {
  const box = document.getElementById("chatMessages");
  if (box.querySelector(".empty-state")) box.innerHTML = "";
  const m = document.createElement("div");
  m.className = `msg ${role}`;
  m.innerHTML = `
    <div class="avatar ${role}"><i class="fa-solid ${role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
    <div class="bubble"></div>`;
  m.querySelector(".bubble").textContent = text;
  box.appendChild(m);
  box.scrollTop = box.scrollHeight;
  return m.querySelector(".bubble");
}

async function sendChat(id) {
  const inp = document.getElementById("chatInput");
  const message = inp.value.trim();
  if (!message) return;
  inp.value = "";
  appendMessage("user", message);
  const aiBubble = appendMessage("ai", "…");

  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tool: id, message, history: chatHistory }),
    });
    const data = await r.json();
    if (data.success) {
      aiBubble.textContent = data.response;
      chatHistory.push({ user: message, assistant: data.response });
    } else {
      aiBubble.textContent = `Error: ${data.error}`;
    }
  } catch (e) {
    aiBubble.textContent = "Network error. Please try again.";
  }
}

// ---------- Theme ----------
const themeBtn = document.getElementById("themeBtn");
const themeIcon = document.getElementById("themeIcon");
const savedTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", savedTheme);
themeIcon.className = savedTheme === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
themeBtn.addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  themeIcon.className = next === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
});

// ---------- Sidebar mobile ----------
document.getElementById("menuBtn").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("open");
});

// ---------- Shortcut: Ctrl/Cmd+K ----------
document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    const el = document.getElementById("userInput") || document.getElementById("chatInput");
    if (el) el.focus();
  }
});

// Default tool
selectTool("hook");
</script>
